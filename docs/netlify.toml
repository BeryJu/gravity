[dev]
framework = "hugo"

[build]
publish = "public"
command = "hugo mod get && hugo --gc --minify"

[build.environment]
  HUGO_ENV = "production"
  HUGO_VERSION = "0.161.0"
  NODE_OPTIONS = "--permission --allow-fs-read=* --allow-fs-write=*"

[context.deploy-preview]
command = "hugo --gc --minify --buildFuture -b $DEPLOY_PRIME_URL"
